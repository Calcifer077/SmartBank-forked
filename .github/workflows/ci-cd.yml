name: SmartBank CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '9.0.x'          # Change to match your .NET version
  API_PROJECT: 'SmartBank.API/SmartBank.API.csproj'
  MVC_PROJECT: 'SmartBank.MVC/SmartBank.MVC.csproj'
  TEST_PROJECT: 'SmartBank.Tests/SmartBank.Tests.csproj'

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    # ── 1. Checkout ──────────────────────────────────────────────
    - name: Checkout code
      uses: actions/checkout@v4

    # ── 2. Setup .NET ─────────────────────────────────────────────
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # ── 3. Restore ────────────────────────────────────────────────
    - name: Restore dependencies
      run: dotnet restore SmartBank.slnx

    # ── 4. Build ──────────────────────────────────────────────────
    - name: Build solution
      run: dotnet build SmartBank.slnx --no-restore --configuration Release

    # ── 5. Run Tests ──────────────────────────────────────────────
    - name: Run tests
      run: dotnet test ${{ env.TEST_PROJECT }} --no-build --configuration Release --verbosity normal

    # ── 6. Publish API ────────────────────────────────────────────
    - name: Publish API
      run: dotnet publish ${{ env.API_PROJECT }} --configuration Release --output ./publish/api

    # ── 7. Publish MVC ────────────────────────────────────────────
    - name: Publish MVC
      run: dotnet publish ${{ env.MVC_PROJECT }} --configuration Release --output ./publish/mvc

    # ── 8. Deploy API to Azure App Service ───────────────────────
    - name: Deploy API to Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'smartbank-api'           # must match your App Service name
        publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
        package: ./publish/api

    # ── 9. Deploy MVC to Azure App Service ───────────────────────
    - name: Deploy MVC to Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'smartbank-mvc'           # must match your App Service name
        publish-profile: ${{ secrets.AZURE_MVC_PUBLISH_PROFILE }}
        package: ./publish/mvc