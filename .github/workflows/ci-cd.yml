name: SmartBank CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Build & Test
  # ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build — Release
        run: dotnet build SmartBank.sln --configuration Release --no-restore

      - name: Run unit tests
        run: >
          dotnet test SmartBank.Tests/SmartBank.Tests.csproj
          --configuration Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/*.trx"

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Deploy (only on push to main, after tests pass)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore SmartBank.sln

      # ── Publish API ────────────────────────────────────────────
      - name: Publish API
        run: >
          dotnet publish SmartBank.API/SmartBank.API.csproj
          --configuration Release
          --output ./publish/api
          --no-restore

      # ── Publish MVC ────────────────────────────────────────────
      - name: Publish MVC
        run: >
          dotnet publish SmartBank.MVC/SmartBank.MVC.csproj
          --configuration Release
          --output ./publish/mvc
          --no-restore

      # ── Deploy API ─────────────────────────────────────────────
      - name: Deploy API to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_API_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ./publish/api

      # ── Deploy MVC ─────────────────────────────────────────────
      - name: Deploy MVC to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_MVC_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_MVC_PUBLISH_PROFILE }}
          package: ./publish/mvc
